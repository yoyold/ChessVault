name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deployments at once, but let a queued deploy finish rather than
# cancelling it — a cancelled deploy can leave Pages serving a half-built site.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Quality gates run before the build so a broken commit never reaches Pages.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

      - name: Resolve base path
        id: base
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          # User/org sites (`<name>.github.io`) are served from the domain root
          # and must NOT get a prefix; project sites are served from /<repo>.
          if [[ "$REPO" == *.github.io ]]; then
            echo "path=" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Build static export
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base.outputs.path }}
        run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
